<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Prompt</title>

    <link href="style.css" rel="stylesheet"/>
    <script defer src="app.js"></script>

</head>
<body>
    <h1><u>AI Prompt :</u></h1>
    <div id="exemples"></div>

    <div class="form">
        <p>To add your own prompt, complete the following form :</p>
        <form id="promptForm">
            <label>Title :</label><br>
            <input type="text" id="title" required><br><br>

            <label>Category :</label><br>
            <input type="text" id="category" required><br><br>

            <label>Prompt :</label><br>
            <input type="text" id="prompt" required><br><br>

            <button id="enter-button">Enter</button>
        </form>
    </div>
</body>
</html>
