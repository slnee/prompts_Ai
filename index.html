<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Prompt</title>

    <link href="style.css" rel="stylesheet"/>
    <script defer src="app.js"></script>

</head>
<body>
    <h1><u>AI Prompt :</u></h1>
    <div id="exemples"></div>

    <div class="form">
        <p>To add your own prompt, complete the following form :</p>
        <form id="promptForm">
            <label for="title"><em>title :</em></label>
            <input type="text" id="title">
            <br>
            <label for="category"><em>category :</em></label>
            <input type="text" id="category">
            <br>
            <label for="prompt"><em>prompts :</em></label>
            <input type="text" id="prompt">
            <br>
        </form>

        <br>
        <button id="enter-button">Enter</button>
    </div>
</body>
</html>
