name: Docker Image CI

on:
  push:
    branches: [ "main, develop" ]
    
  pull_request:
    branches: [ "main, develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the docker image
      run: 
        echo "build docker image"
        docker compose up -d

    - name: Check the docker image
      run: 
        echo "check docker image"
        docker ps

